<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>orta_note Lite</title>
    <link href="./node_modules/quill/dist/quill.snow.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #toolbar { border-bottom: 1px solid #ddd; background: #fafafa; padding: 5px; }
        #editor { height: calc(100vh - 85px); font-size: 16px; }
        .ql-container.ql-snow { border: none !important; }
        .ql-editor { padding: 30px 50px; line-height: 1.6; height: 100%; }
        
        .ql-editor pre.ql-syntax { 
            background-color: #272822 !important; 
            color: #f8f8f2 !important; 
            padding: 15px !important; 
            border-radius: 5px; 
            font-family: 'Consolas', monospace; 
        }

        #status-bar {
            height: 25px;
            background: #f0f0f0;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #666;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 100;
            gap: 15px;
        }

        .ql-editor li[data-list="checked"] {
            text-decoration: line-through;
            color: #a0a0a0;
            transition: all 0.3s ease;
        }
    </style>
    </head>
<body>

    <div id="toolbar">
        <span class="ql-formats">
            <select class="ql-header">
                <option value="1">Título</option>
                <option value="2">Subtítulo</option>
                <option selected>Normal</option>
            </select>
        </span>
        <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>                    
        </span>

        <!-- Botones de alineacion -->
        <span class="ql-formats">
            <button class="ql-align" value=""></button>      
            <button class="ql-align" value="center"></button>  
            <button class="ql-align" value="right"></button>   
            <button class="ql-align" value="justify"></button> 
        </span>


        <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
            <button class="ql-list" value="check"></button>
        </span>
        <!--Botones codigo, link, imagen, limpiar-->
        <span class="ql-formats">
            <button class="ql-code-block"></button>
            <button class="ql-link"></button> 
            <button class="ql-image"></button>
            <button class="ql-clean"></button>
        </span>
    </div>
    <div id="editor"></div>
    <!-- Barra de estatus -->
    <div id="status-bar">
        <span id="line-number">Línea: 1</span> <span class="separator">|</span>
        <span id="char-count">Caracteres: 0</span>
        <span class="separator">|</span>
        <span id="word-count">Palabras: 0</span>
        <span id="ontop-status" style="color: #007acc; font-weight: bold; display: none;">📌 FIJADO</span>
        <span id="save-status" style="margin-left: auto; margin-right: 20px; color: #28a745; font-weight: bold; opacity: 0; transition: opacity 0.3s; white-space: nowrap;">✓ Guardado</span>
    </div>
    <script src="./node_modules/quill/dist/quill.js"></script>
    <script src="./node_modules/quill-image-resize-module/image-resize.min.js"></script>
    <script src="renderer.js"></script>
   
    </body>
</html>
